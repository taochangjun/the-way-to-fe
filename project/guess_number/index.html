<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数字猜谜游戏</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #1f2a44;
      }
      .card {
        width: min(92vw, 420px);
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.08);
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 8px 0 16px;
        color: #51607a;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      input,
      button {
        height: 40px;
        border-radius: 8px;
        border: 1px solid #d7deea;
        font-size: 16px;
      }
      input {
        flex: 1;
        padding: 0 10px;
      }
      button {
        cursor: pointer;
        padding: 0 14px;
        background: #2b6ef2;
        border: none;
        color: #fff;
      }
      button[disabled] {
        cursor: not-allowed;
        background: #9ab5f5;
      }
      #newGameBtn {
        margin-top: 12px;
        display: none;
      }
      #message {
        min-height: 24px;
        margin-top: 14px;
        font-weight: 600;
      }
      #attempts {
        margin-top: 8px;
        color: #51607a;
      }
      #history {
        margin-top: 8px;
        color: #51607a;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>数字猜谜游戏</h1>
      <p>我已经想好一个 1-100 的整数，来猜猜看。</p>

      <div class="row">
        <input id="guessInput" type="text" placeholder="请输入 1-100 的数字" />
        <button id="guessBtn" type="button">猜</button>
      </div>

      <button id="newGameBtn" type="button">新游戏</button>
      <div id="message"></div>
      <div id="attempts">已猜次数：0</div>
      <div id="history">历史猜测：暂无</div>
    </main>

    <script>
      const guessInput = document.getElementById("guessInput");
      const guessBtn = document.getElementById("guessBtn");
      const newGameBtn = document.getElementById("newGameBtn");
      const message = document.getElementById("message");
      const attemptsEl = document.getElementById("attempts");
      const historyEl = document.getElementById("history");

      let targetNumber = 0;
      let attempts = 0;
      let guessHistory = [];

      function randomInt1To100() {
        return Math.floor(Math.random() * 100) + 1;
      }

      function resetGame() {
        targetNumber = randomInt1To100();
        attempts = 0;
        guessHistory = [];
        attemptsEl.textContent = "已猜次数：0";
        historyEl.textContent = "历史猜测：暂无";
        message.textContent = "新游戏开始，继续猜吧！";
        guessInput.value = "";
        guessInput.disabled = false;
        guessBtn.disabled = false;
        newGameBtn.style.display = "none";
        guessInput.focus();
      }

      function validateGuess(rawValue) {
        if (rawValue.trim() === "") {
          return "请输入数字，不要留空。";
        }
        const value = Number(rawValue);
        if (!Number.isInteger(value)) {
          return "请输入整数（1-100）。";
        }
        if (value < 1 || value > 100) {
          return "请输入 1 到 100 之间的数字。";
        }
        return null;
      }

      function handleGuess() {
        const rawValue = guessInput.value;
        const error = validateGuess(rawValue);
        if (error) {
          message.textContent = error;
          return;
        }

        const guess = Number(rawValue);
        attempts += 1;
        guessHistory.push(guess);
        attemptsEl.textContent = `已猜次数：${attempts}`;
        historyEl.textContent = `历史猜测：${guessHistory.join(", ")}`;

        if (guess > targetNumber) {
          message.textContent = "猜大了";
        } else if (guess < targetNumber) {
          message.textContent = "猜小了";
        } else {
          message.textContent = `恭喜！猜中了！共用 ${attempts} 次`;
          guessInput.disabled = true;
          guessBtn.disabled = true;
          newGameBtn.style.display = "inline-block";
        }
      }

      guessBtn.addEventListener("click", handleGuess);
      guessInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !guessBtn.disabled) {
          handleGuess();
        }
      });
      newGameBtn.addEventListener("click", resetGame);

      resetGame();
    </script>
  </body>
</html>
