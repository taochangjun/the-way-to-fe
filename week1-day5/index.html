<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day5 Responsive 实战</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        line-height: 1.5;
        color: #1f2937;
        background: #f5f7fb;
      }

      .container {
        width: min(100%, 960px);
        margin: 0 auto;
        padding: 12px;
      }

      .topbar {
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
      }

      .topbar-inner {
        width: min(100%, 960px);
        margin: 0 auto;
        padding: 10px 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
      }

      .topbar nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .topbar a {
        text-decoration: none;
        color: #1d4ed8;
        padding: 6px 10px;
        border-radius: 8px;
      }

      .topbar a:hover {
        background: #dbeafe;
      }

      .hero,
      .card,
      .tips {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
      }

      .hero {
        padding: 16px;
        margin-bottom: 12px;
      }

      .cards {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .card {
        padding: 14px;
      }

      .tips {
        margin-top: 12px;
        padding: 14px;
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
        border-radius: 8px;
      }

      @media (min-width: 768px) {
        .container {
          padding: 16px;
        }

        .cards {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (min-width: 1024px) {
        .container {
          padding: 20px;
        }

        .cards {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <strong>Day5 Responsive 实战</strong>
        <nav>
          <a href="#intro">介绍</a>
          <a href="#cards">卡片区</a>
          <a href="#tips">检查点</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero" id="intro">
        <h1>响应式布局练习页</h1>
        <p>默认手机单列，平板双列，桌面三列。请用 DevTools 切换 375 / 768 / 1024 验证布局变化。</p>
      </section>

      <section class="cards" id="cards">
        <article class="card">
          <h2>模块 A</h2>
          <p>移动端单列，保证可读性。</p>
        </article>
        <article class="card">
          <h2>模块 B</h2>
          <p>平板开始并排，提升空间利用率。</p>
        </article>
        <article class="card">
          <h2>模块 C</h2>
          <p>桌面三列展示，提高信息密度。</p>
        </article>
        <article class="card">
          <h2>模块 D</h2>
          <p>继续观察不同断点下卡片数量变化。</p>
        </article>
        <article class="card">
          <h2>模块 E</h2>
          <p>练习时可替换为真实内容模块。</p>
        </article>
        <article class="card">
          <h2>模块 F</h2>
          <p>确保手机下无横向滚动条。</p>
        </article>
      </section>

      <section class="tips" id="tips">
        <h2>自测提示</h2>
        <ul>
          <li>375px：单列，无横向滚动。</li>
          <li>768px：双列，间距舒适。</li>
          <li>1024px：三列，内容不拥挤。</li>
        </ul>
      </section>
    </main>
  </body>
</html>
