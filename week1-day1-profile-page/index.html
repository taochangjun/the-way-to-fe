<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>个人简介</title>
        <style>
            body {
                height: 200vh;
                /* 全局字体 */
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                /* 行高 （无单位数字，比如1.5），表示当前字体大小的1.5倍，这样当子元素字体大小不同时，行高会自动按比例缩放。 */
                line-height: 1.5;
            }
            /* 每个 section 下方留出 2rem 间距(2个rem，表示当前字体大小的2倍  */
            /* section {
                margin-bottom: 2rem; 
            } 
            */

            /* 相邻兄弟选择器：选择紧挨着的下一个兄弟元素
            含义：紧接在另一个 section 后面的 section，在其上方添加间距。
            优点：不会给第一个 section 添加上边距，也不会给最后一个添加下边距，且间距不会叠加（因为只设置了上边距）。
             */
            /* section + section {
                margin-top: 2rem;
            } */
            
            /* 如果所有 section 都放在同一个容器内（例如 <main>），可以： */
            main {
                display: flex;
                flex-direction: column;
                gap: 2rem;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Thomas的个人简介</h1>
            <nav>
                <a href="#intro">关于我</a>
                <a href="#skills">技能列表</a>
                <a href="#projects">项目</a>
            </nav>
        </header>
        <main>
            <section id="intro">
                <h2>自我介绍</h2>
                <img src="./images/avatar.png" alt="thomas">
                <br>
                <p>我是一个热爱编程的年轻人，喜欢探索新技术，喜欢挑战自己，喜欢分享知识。</p>
            </section>
            <section id="skills">
                <h2>技能列表</h2>
                <ul>
                    <li>HTML</li>
                    <li>CSS</li>
                    <li>JavaScript</li>
                    <li>VUE</li>
                    <li>Python</li>
                </ul>
            </section>
            <section id="projects">
                <h2>项目</h2>
                <ul>
                    <li>项目1</li>
                    <li>项目2</li>
                    <li>项目3</li>
                </ul>
            </section>
        </main>
        <footer>
            <div>
                <h3>联系方式</h3>
                <p><a href="mailto:630023774@qq.com">邮箱: 630023774@qq.com</a></p>
            </div>
            <div>
                <h3>给我留言</h3>
                <form action="#" method="post">
                    <div>
                        <label for="name">姓名:</label>
                        <input type="text" id="name" name="name" placeholder="请输入您的姓名" required>
                    </div>
                    <div>
                        <label for="email">邮箱:</label>
                        <input type="email" id="email" name="email" placeholder="请输入您的邮箱" required>
                    </div>
                    <div>
                        <label for="message">留言:</label>
                        <textarea id="message" name="message" placeholder="请输入您的留言" required></textarea>
                    </div>
                    <button type="submit">提交</button>
                </form>
            </div>
            <p>版权所有 © 2026 个人简介</p>
        </footer>
    </body>

</html>
