<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab05 - Reflow Repaint ZIndex</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      .box { width: 120px; height: 120px; position: relative; margin-bottom: 16px; }
      .a, .b { position: absolute; width: 100px; height: 100px; top: 10px; left: 10px; }
      .a { background: rgba(37, 99, 235, 0.7); z-index: 1; }
      .b { background: rgba(239, 68, 68, 0.7); transform: translate(20px, 20px); z-index: 0; }
      .target { width: 120px; height: 40px; background: #16a34a; color: #fff; display: grid; place-items: center; margin-top: 12px; }
      button { margin-right: 8px; }
    </style>
  </head>
  <body>
    <h1>Lab05：重排重绘与 z-index</h1>
    <p>按钮1改宽度（常触发重排），按钮2改颜色（通常重绘）。再观察 z-index 与 transform 对层叠的影响。</p>

    <button id="changeWidth">改 width</button>
    <button id="changeColor">改 color</button>

    <div class="target" id="target">TARGET</div>

    <div class="box">
      <div class="a">A z=1</div>
      <div class="b">B z=0 + transform</div>
    </div>

    <script>
      const target = document.getElementById("target");
      document.getElementById("changeWidth").addEventListener("click", () => {
        target.style.width = target.offsetWidth === 120 ? "260px" : "120px";
      });
      document.getElementById("changeColor").addEventListener("click", () => {
        target.style.background = target.style.background === "rgb(30, 64, 175)" ? "#16a34a" : "#1e40af";
      });
    </script>
  </body>
</html>
